services:
  app:
    build: .
    ports:
      - "4321:8080"
    volumes:
      - app-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/whattheflux.db
      - Auth__Username=${AUTH_USERNAME}
      - Auth__Password=${AUTH_PASSWORD}
    restart: unless-stopped

volumes:
  app-data:
